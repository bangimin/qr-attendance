<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
      background: #f5f5f5;
    }
    h2 { margin-bottom: 20px; }
    #reader {
      width: 100%;
      max-width: 500px;
      margin: auto;
    }
    #result {
      margin-top: 20px;
      padding: 20px;
      border-radius: 10px;
      font-size: 24px;
      font-weight: bold;
    }
    .success { background: #d4edda; color: #155724; }
    .error   { background: #f8d7da; color: #721c24; }
    .loading { background: #fff3cd; color: #856404; }

    /* Dropdown */
    #sheet-selector {
      margin-bottom: 20px;
    }
    #sheet-selector label {
      font-size: 14px;
      color: #555;
      margin-right: 8px;
    }
    #sheet-selector select {
      padding: 8px 16px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }

    /* Statistik */
    #statistik {
      margin-top: 24px;
      padding: 20px;
      background: #fff;
      border-radius: 12px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    #statistik h3 {
      margin: 0 0 16px 0;
      font-size: 16px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .stat-row {
      display: flex;
      justify-content: space-around;
      margin-bottom: 16px;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-number {
      font-size: 36px;
      font-weight: bold;
      color: #333;
    }
    .stat-number.hadir { color: #155724; }
    .stat-number.persen { color: #0d6efd; }
    .stat-label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .progress-bar-bg {
      background: #e9ecef;
      border-radius: 999px;
      height: 12px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #198754;
      border-radius: 999px;
      transition: width 0.5s ease;
      width: 0%;
    }
  </style>
</head>
<body>

<h2>Scanner Wisuda</h2>

<!-- Dropdown pilih sheet -->
<div id="sheet-selector">
  <label>Sesi:</label>
  <select id="selected-sheet" onchange="onSheetChange()">
    <option value="ayah">Ayah</option>
    <option value="ibu">Ibu</option>
    <option value="makan">Makan</option>
    <option value="peserta">Peserta</option>
  </select>
</div>

<div id="reader"></div>
<div id="result"></div>

<div id="statistik">
  <h3 id="stat-title">Statistik — Ayah</h3>
  <div class="stat-row">
    <div class="stat-item">
      <span class="stat-number hadir" id="stat-hadir">-</span>
      <span class="stat-label">Hadir</span>
    </div>
    <div class="stat-item">
      <span class="stat-number" id="stat-total">-</span>
      <span class="stat-label">Total Peserta</span>
    </div>
    <div class="stat-item">
      <span class="stat-number persen" id="stat-persen">-</span>
      <span class="stat-label">Persentase</span>
    </div>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>
</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyEG5x9RKqr2Dnb_o6sSh-QzZ6iiVVEiWIqQgdu-9fTytgw_O29dPQVk8Mv84LzG_g/exec";

  let scanning = true;

  function getSelectedSheet() {
    return document.getElementById('selected-sheet').value;
  }

  function onSheetChange() {
    // Update judul statistik
    const label = document.getElementById('selected-sheet').selectedOptions[0].text;
    document.getElementById('stat-title').textContent = `Statistik — ${label}`;

    // Reset statistik lalu load ulang
    document.getElementById('stat-hadir').textContent = '-';
    document.getElementById('stat-total').textContent = '-';
    document.getElementById('stat-persen').textContent = '-';
    document.getElementById('progress-bar').style.width = '0%';
    loadStatistik();
  }

  function updateStatistik(hadir, total) {
    const persen = total > 0 ? ((hadir / total) * 100).toFixed(1) : 0;
    document.getElementById('stat-hadir').textContent = hadir;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-persen').textContent = persen + '%';
    document.getElementById('progress-bar').style.width = persen + '%';
  }

  function loadStatistik() {
    const sheet = getSelectedSheet();
    fetch(`${APPS_SCRIPT_URL}?action=statistik&sheet=${sheet}`)
      .then(res => res.text())
      .then(text => {
        const response = JSON.parse(text);
        if (response.hadir !== undefined) {
          updateStatistik(response.hadir, response.total);
        }
      })
      .catch(() => {});
  }

  function resetScanner() {
    scanning = true;
    const result = document.getElementById('result');
    result.innerHTML = '';
    result.className = '';
  }

  function onScanSuccess(decodedText) {
    if (!scanning) return;
    scanning = false;

    const result = document.getElementById('result');
    result.className = 'loading';
    result.innerHTML = '⏳ Memproses...';

    const sheet = getSelectedSheet();

    fetch(`${APPS_SCRIPT_URL}?qr=${encodeURIComponent(decodedText)}&sheet=${sheet}`)
      .then(res => {
        if (!res.ok) throw new Error(`HTTP error: ${res.status}`);
        return res.text();
      })
      .then(text => {
        const response = JSON.parse(text);

        if (response.success) {
          result.className = 'success';
          result.innerHTML = `✓ ${response.message}<br><br>${response.nama}`;
        } else {
          result.className = 'error';
          result.innerHTML = `✗ ${response.message}<br><br>${response.nama || ''}`;
        }

        if (response.hadir !== undefined && response.total !== undefined) {
          updateStatistik(response.hadir, response.total);
        }

        if (navigator.vibrate) navigator.vibrate(200);
        setTimeout(resetScanner, 2000);
      })
      .catch(err => {
        result.className = 'error';
        result.innerHTML = `✗ Gagal konek: ${err.message}`;
        setTimeout(resetScanner, 3000);
      });
  }

  function onScanFailure(error) {}

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess,
    onScanFailure
  ).catch(() => {
    html5QrCode.start(
      { facingMode: "user" },
      { fps: 10, qrbox: 250 },
      onScanSuccess,
      onScanFailure
    ).catch(err => {
      document.getElementById('result').className = 'error';
      document.getElementById('result').innerHTML = '✗ Kamera tidak bisa diakses: ' + err;
    });
  });

  // Load statistik awal
  loadStatistik();
</script>

</body>
</html>
