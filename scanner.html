<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
      background: #f5f5f5;
    }
    h2 { margin-bottom: 20px; }
    #reader {
      width: 100%;
      max-width: 500px;
      margin: auto;
    }
    #result {
      margin-top: 20px;
      padding: 20px;
      border-radius: 10px;
      font-size: 24px;
      font-weight: bold;
    }
    #last-scan {
      margin-top: 10px;
      font-size: 18px;
      color: #333;
    }
    .success { background: #d4edda; color: #155724; }
    .error   { background: #f8d7da; color: #721c24; }
    .loading { background: #fff3cd; color: #856404; }

    #sheet-selector {
      margin-bottom: 20px;
    }
    #sheet-selector label {
      font-size: 14px;
      color: #555;
      margin-right: 8px;
    }
    #sheet-selector select {
      padding: 8px 16px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }

    .stat-card {
      margin-top: 20px;
      padding: 20px;
      background: #fff;
      border-radius: 12px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .stat-card h3 {
      margin: 0 0 16px 0;
      font-size: 16px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .stat-row {
      display: flex;
      justify-content: space-around;
      margin-bottom: 16px;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-number {
      font-size: 36px;
      font-weight: bold;
      color: #333;
    }
    .stat-number.hadir  { color: #155724; }
    .stat-number.persen { color: #0d6efd; }
    .stat-label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .progress-bar-bg {
      background: #e9ecef;
      border-radius: 999px;
      height: 12px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #198754;
      border-radius: 999px;
      transition: width 0.5s ease;
      width: 0%;
    }

    .stat-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 14px;
    }
    .stat-table th {
      background: #f0f0f0;
      padding: 8px;
      text-align: left;
      color: #555;
    }
    .stat-table td {
      padding: 8px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }
    .stat-table tr:last-child td {
      border-bottom: none;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-smp   { background: #cfe2ff; color: #084298; }
    .badge-sma   { background: #d1e7dd; color: #0a3622; }
    .badge-other { background: #e2e3e5; color: #383d41; }
  </style>
</head>
<body>

<h2>Scanner Wisuda</h2>

<div id="sheet-selector">
  <select id="selected-sheet" onchange="onSheetChange()">
    <option value="peserta">Peserta</option>
    <option value="ayah">Ayah</option>
    <option value="ibu">Ibu</option>
    <option value="makan">Makan</option>
  </select>
</div>

<div id="reader"></div>
<div id="result"></div>
<div id="last-scan"></div>

<div class="stat-card">
  <h3 id="stat-title">Statistik — Peserta</h3>
  <div class="stat-row">
    <div class="stat-item">
      <span class="stat-number hadir" id="stat-hadir">-</span>
      <span class="stat-label">Hadir</span>
    </div>
    <div class="stat-item">
      <span class="stat-number" id="stat-total">-</span>
      <span class="stat-label">Total Peserta</span>
    </div>
    <div class="stat-item">
      <span class="stat-number persen" id="stat-persen">-</span>
      <span class="stat-label">Persentase</span>
    </div>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>
</div>

<div class="stat-card">
  <h3>Statistik Per Jenjang</h3>
  <table class="stat-table">
    <thead>
      <tr>
        <th>Jenjang</th>
        <th>Hadir</th>
        <th>Total</th>
        <th>%</th>
      </tr>
    </thead>
    <tbody id="stat-jenjang-body">
      <tr><td colspan="4" style="color:#aaa">Memuat...</td></tr>
    </tbody>
  </table>
</div>

<div class="stat-card">
  <h3>Statistik Per Kelas</h3>
  <table class="stat-table">
    <thead>
      <tr>
        <th>Kelas</th>
        <th>Jenjang</th>
        <th>Hadir</th>
        <th>Total</th>
        <th>%</th>
      </tr>
    </thead>
    <tbody id="stat-kelas-body">
      <tr><td colspan="5" style="color:#aaa">Memuat...</td></tr>
    </tbody>
  </table>
</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyEG5x9RKqr2Dnb_o6sSh-QzZ6iiVVEiWIqQgdu-9fTytgw_O29dPQVk8Mv84LzG_g/exec";

  let scanning = true;

  function getSelectedSheet() {
    return document.getElementById('selected-sheet').value;
  }

  function onSheetChange() {
    const label = document.getElementById('selected-sheet').selectedOptions[0].text;
    document.getElementById('stat-title').textContent = `Statistik — ${label}`;
    document.getElementById('stat-hadir').textContent = '-';
    document.getElementById('stat-total').textContent = '-';
    document.getElementById('stat-persen').textContent = '-';
    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('stat-jenjang-body').innerHTML = '<tr><td colspan="4" style="color:#aaa">Memuat...</td></tr>';
    document.getElementById('stat-kelas-body').innerHTML = '<tr><td colspan="5" style="color:#aaa">Memuat...</td></tr>';
    loadStatistik();
  }

  function getBadgeClass(jenjang) {
    const j = (jenjang || '').toUpperCase();
    if (j === 'SMP') return 'badge badge-smp';
    if (j === 'SMA') return 'badge badge-sma';
    return 'badge badge-other';
  }

  function updateStatistik(data) {
    if (data.total === undefined) return;

    const persen = data.total > 0 ? ((data.hadir / data.total) * 100).toFixed(1) : 0;
    document.getElementById('stat-hadir').textContent = data.hadir;
    document.getElementById('stat-total').textContent = data.total;
    document.getElementById('stat-persen').textContent = persen + '%';
    document.getElementById('progress-bar').style.width = persen + '%';

    const jenjangBody = document.getElementById('stat-jenjang-body');
    if (data.jenjang && Object.keys(data.jenjang).length > 0) {
      jenjangBody.innerHTML = Object.entries(data.jenjang)
        .sort((a, b) => a[0].localeCompare(b[0]))
        .map(([nama, val]) => {
          const p = val.total > 0 ? ((val.hadir / val.total) * 100).toFixed(1) : 0;
          return `<tr>
            <td><span class="${getBadgeClass(nama)}">${nama}</span></td>
            <td>${val.hadir}</td>
            <td>${val.total}</td>
            <td>${p}%</td>
          </tr>`;
        }).join('');
    } else {
      jenjangBody.innerHTML = '<tr><td colspan="4" style="color:#aaa">Tidak ada data</td></tr>';
    }

    const kelasBody = document.getElementById('stat-kelas-body');
    if (data.kelas && Object.keys(data.kelas).length > 0) {
      kelasBody.innerHTML = Object.entries(data.kelas)
        .sort((a, b) => a[0].localeCompare(b[0]))
        .map(([nama, val]) => {
          const p = val.total > 0 ? ((val.hadir / val.total) * 100).toFixed(1) : 0;
          return `<tr>
            <td>${nama}</td>
            <td><span class="${getBadgeClass(val.jenjang)}">${val.jenjang}</span></td>
            <td>${val.hadir}</td>
            <td>${val.total}</td>
            <td>${p}%</td>
          </tr>`;
        }).join('');
    } else {
      kelasBody.innerHTML = '<tr><td colspan="5" style="color:#aaa">Tidak ada data</td></tr>';
    }
  }

  function loadStatistik() {
    const sheet = getSelectedSheet();
    fetch(`${APPS_SCRIPT_URL}?action=statistik&sheet=${sheet}`)
      .then(res => res.text())
      .then(text => {
        const response = JSON.parse(text);
        updateStatistik(response);
      })
      .catch(() => {});
  }

  function resetScanner() {
    scanning = true;
    const result = document.getElementById('result');
    result.innerHTML = '';
    result.className = '';
  }

  function onScanSuccess(decodedText) {
    if (!scanning) return;
    scanning = false;

    const result = document.getElementById('result');
    result.className = 'loading';
    result.innerHTML = '⏳ Memproses...';

    document.getElementById('last-scan').innerHTML = '';

    const sheet = getSelectedSheet();

    fetch(`${APPS_SCRIPT_URL}?qr=${encodeURIComponent(decodedText)}&sheet=${sheet}`)
      .then(res => {
        if (!res.ok) throw new Error(`HTTP error: ${res.status}`);
        return res.text();
      })
      .then(text => {
        const response = JSON.parse(text);

        if (response.success) {
          result.className = 'success';
          result.innerHTML = '✓ ' + response.message;
        } else {
          result.className = 'error';
          result.innerHTML = '✗ ' + response.message;
        }

        if (response.nama) {
          document.getElementById('last-scan').innerHTML = `<b>${response.nama}</b>`;
        }

        updateStatistik(response);
        if (navigator.vibrate) navigator.vibrate(200);
        setTimeout(resetScanner, 2000);
      })
      .catch(err => {
        result.className = 'error';
        result.innerHTML = `✗ Gagal konek: ${err.message}`;
        setTimeout(resetScanner, 3000);
      });
  }

  function onScanFailure(error) {}

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess,
    onScanFailure
  ).catch(() => {
    html5QrCode.start(
      { facingMode: "user" },
      { fps: 10, qrbox: 250 },
      onScanSuccess,
      onScanFailure
    ).catch(err => {
      document.getElementById('result').className = 'error';
      document.getElementById('result').innerHTML = '✗ Kamera tidak bisa diakses: ' + err;
    });
  });

  loadStatistik();
</script>

</body>
</html>
