<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      text-align: center;
      background: #f5f5f5;
    }
    h2 { margin-bottom: 20px; }
    #reader {
      width: 100%;
      max-width: 500px;
      margin: auto;
    }
    #result {
      margin-top: 20px;
      padding: 20px;
      border-radius: 10px;
      font-size: 24px;
      font-weight: bold;
    }
    .success { background: #d4edda; color: #155724; }
    .error   { background: #f8d7da; color: #721c24; }
    .loading { background: #fff3cd; color: #856404; }
  </style>
</head>
<body>

<h2>Scanner Wisuda</h2>
<div id="reader"></div>
<div id="result"></div>

<script>
  // ⬇️ GANTI DENGAN URL DEPLOYMENT APPS SCRIPT KAMU
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/XXXXXXX/exec";

  let scanning = true;

  function resetScanner() {
    scanning = true;
    const result = document.getElementById('result');
    result.innerHTML = '';
    result.className = '';
  }

  function onScanSuccess(decodedText) {
    if (!scanning) return;
    scanning = false;

    const result = document.getElementById('result');
    result.className = 'loading';
    result.innerHTML = '⏳ Memproses...';

    fetch(`${APPS_SCRIPT_URL}?qr=${encodeURIComponent(decodedText)}`)
      .then(res => res.json())
      .then(response => {
        if (response.success) {
          result.className = 'success';
          result.innerHTML = `✓ ${response.message}<br><br>${response.nama}`;
        } else {
          result.className = 'error';
          result.innerHTML = `✗ ${response.message}<br><br>${response.nama || ''}`;
        }

        if (navigator.vibrate) navigator.vibrate(200);
        setTimeout(resetScanner, 2000);
      })
      .catch(err => {
        result.className = 'error';
        result.innerHTML = `✗ Gagal konek ke server`;
        setTimeout(resetScanner, 3000);
      });
  }

  function onScanFailure(error) {}

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess,
    onScanFailure
  ).catch(() => {
    html5QrCode.start(
      { facingMode: "user" },
      { fps: 10, qrbox: 250 },
      onScanSuccess,
      onScanFailure
    ).catch(err => {
      document.getElementById('result').className = 'error';
      document.getElementById('result').innerHTML = '✗ Kamera tidak bisa diakses: ' + err;
    });
  });
</script>

</body>
</html>
